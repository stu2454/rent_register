version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rentledger
      POSTGRES_USER: rentuser
      POSTGRES_PASSWORD: rentpass
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentuser -d rentledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./app
    env_file: [.env]
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://rentuser:rentpass@db:5432/rentledger}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      PYTHONUNBUFFERED: "1"
    ports: ["5002:5000"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app

volumes:
  pgdata:
