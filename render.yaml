databases:
  - name: rent-ledger-db
    databaseName: rentledger
    user: rentuser
    plan: free
    region: oregon

services:
  - type: web
    name: rent-ledger
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rent-ledger-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /
