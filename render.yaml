# Render Blueprint — SDA Calculator
# Fix 1: Database moved to top-level 'databases:' block (correct Render Blueprint syntax)
# Fix 2: Backend dockerContext changed from '.' to './backend' (so COPY *.py works correctly)

databases:
  - name: sda-calc-db
    databaseName: sda_calc
    user: sda_user
    plan: free
    region: oregon

services:
  # FastAPI Backend
  - type: web
    name: sda-calc-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend # FIXED: was '.' — backend Dockerfile does COPY *.py so context must be ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sda-calc-db
          property: connectionString
    healthCheckPath: /api/v1/health

  # React Frontend
  - type: web
    name: sda-calc-frontend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    dockerBuildArgs:
      - VITE_API_URL=https://sda-calc-backend.onrender.com
    envVars:
      - key: VITE_API_URL
        value: https://sda-calc-backend.onrender.com
